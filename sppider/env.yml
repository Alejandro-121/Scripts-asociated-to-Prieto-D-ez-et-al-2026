##############################################################################
# environment.yml — Entorno conda para sppIDer
#
# Uso:
#   conda env create -f environment.yml
#   conda activate sppider
#
# Notas:
#   - Se elimina la dependencia de r-doby. La función splitBy()
#     se provee como reemplazo local en splitBy_local.R
#   - bwa, samtools, bedtools se cargan vía module load en Drago,
#     NO se instalan en el entorno conda.
##############################################################################
name: new_sppider

channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────
  - python=3.11
  - biopython>=1.83

  # ── R base + paquetes ─────────────────────────────────────
  - r-base>=4.3
  - r-ggplot2>=3.4
  - r-dplyr>=1.1
  - r-data.table>=1.15
  # r-doby  ← ELIMINADO, reemplazado por splitBy_local.R

  # ── Utilidades ────────────────────────────────────────────
  - pip
